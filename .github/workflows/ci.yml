name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Production's Dockerfile installs fortune-mod; /api/fortune 503s without it.
      - name: Install fortune
        run: sudo apt-get update && sudo apt-get install -y fortune-mod fortunes

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest
