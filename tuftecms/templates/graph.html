{% extends "base.html" %}

{% block content %}
<article>
    <header>
        <h1>Cross-Reference Graph</h1>
        <p class="subtitle">Every essay that cites another, drawn as one web.</p>
    </header>

    <section>
        <p>Each node is a page; each line is a cross-reference. Hubs are drawn larger. Hover a node to see its neighborhood, click to read it, drag to rearrange.</p>

        <div class="graph-controls">
            <button id="resetZoom">Reset View</button>
            <button id="toggleLabels">All Labels</button>
            <span id="graphStats">Loading…</span>
        </div>

        <div id="graph-container">
            <svg id="network-graph" width="100%" height="640"></svg>
        </div>

        <div class="graph-legend" id="graphLegend"></div>
    </section>
</article>

<style>
    .subtitle {
        font-style: italic;
        color: var(--ink-muted);
        margin-top: -1rem;
        margin-bottom: 2rem;
    }

    .graph-controls,
    #graph-container,
    .graph-legend {
        width: 65%;
    }

    .graph-controls {
        margin-bottom: 1rem;
        display: flex;
        gap: 0.5rem;
        align-items: center;
    }

    .graph-controls button {
        padding: 0.3rem 0.9rem;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--ink-muted);
        border-radius: 999px;
        cursor: pointer;
        font-size: 0.85rem;
        font-family: inherit;
        transition: color 0.2s ease, border-color 0.2s ease;
    }

    .graph-controls button:hover,
    .graph-controls button.active {
        color: var(--accent);
        border-color: var(--accent);
    }

    #graphStats {
        margin-left: auto;
        font-size: 0.85rem;
        color: var(--ink-faint);
        font-family: et-book-roman-old-style, et-book, Palatino, Georgia, serif;
    }

    #graph-container {
        border: 1px solid var(--line);
        border-radius: 6px;
        overflow: hidden;
        background: var(--surface);
    }

    #network-graph {
        display: block;
        width: 100%;
        height: 640px;
        cursor: grab;
    }

    #network-graph:active {
        cursor: grabbing;
    }

    .node {
        stroke: var(--surface);
        stroke-width: 1.25px;
        cursor: pointer;
    }

    .link {
        stroke: var(--ink-faint);
        stroke-opacity: 0.35;
        stroke-width: 1px;
    }

    .node-label {
        font-size: 11px;
        font-family: et-book, Palatino, "Palatino Linotype", "Book Antiqua", Georgia, serif;
        font-style: italic;
        fill: var(--ink-muted);
        text-anchor: middle;
        pointer-events: none;
        paint-order: stroke;
        stroke: var(--surface);
        stroke-width: 3px;
        stroke-linejoin: round;
    }

    .graph-tooltip {
        position: absolute;
        padding: 0.5rem 0.75rem;
        background: var(--ink);
        color: var(--paper);
        border-radius: 4px;
        pointer-events: none;
        font-size: 0.85rem;
        font-family: et-book, Palatino, Georgia, serif;
        z-index: 10;
        max-width: 260px;
        line-height: 1.35;
    }

    .graph-tooltip .tooltip-meta {
        opacity: 0.7;
        font-style: italic;
        font-size: 0.78rem;
    }

    .graph-legend {
        margin-top: 0.9rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem 1.3rem;
        font-size: 0.85rem;
        color: var(--ink-muted);
        font-variant: small-caps;
        letter-spacing: 0.04em;
    }

    .graph-legend .legend-swatch {
        display: inline-block;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        margin-right: 0.4rem;
        vertical-align: baseline;
    }

    @media (max-width: 768px) {
        .graph-controls,
        #graph-container,
        .graph-legend {
            width: 100%;
        }

        #network-graph {
            height: 420px;
        }

        .graph-controls {
            flex-wrap: wrap;
        }

        #graphStats {
            margin-left: 0;
            width: 100%;
        }
    }
</style>

<script src="/static/js/d3.v7.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('graph-container');
    const width = container.clientWidth;
    const height = 640;

    const svg = d3.select("#network-graph")
        .attr("viewBox", [0, 0, width, height]);

    const tooltip = d3.select("body").append("div")
        .attr("class", "graph-tooltip")
        .style("opacity", 0);

    // Node colors come from the site's category tokens, so the graph
    // follows the palette in both modes (and re-follows on theme toggle).
    const CATEGORY_VARS = {
        "essays": "--cat-essay",
        "artificial-intelligence": "--cat-ai",
        "software": "--cat-software",
        "music": "--cat-music",
        "poetry": "--cat-poetry",
        "themes": "--cat-philosophy",
        "pages": "--ink-muted",
    };

    function colorFor(category) {
        const styles = getComputedStyle(document.body);
        const varName = CATEGORY_VARS[category] || "--accent";
        return styles.getPropertyValue(varName).trim() || styles.getPropertyValue("--accent").trim();
    }

    const zoom = d3.zoom()
        .scaleExtent([0.15, 8])
        .on("zoom", (event) => g.attr("transform", event.transform));

    svg.call(zoom);
    const g = svg.append("g");

    d3.json("/archive/graph/data").then(function(data) {
        document.getElementById('graphStats').textContent =
            `${data.nodes.length} pages · ${data.edges.length} references`;

        // Size nodes by how connected they are.
        const degree = new Map();
        data.edges.forEach(e => {
            degree.set(e.source, (degree.get(e.source) || 0) + 1);
            degree.set(e.target, (degree.get(e.target) || 0) + 1);
        });
        const radius = d => 3.5 + Math.min(11, Math.sqrt(degree.get(d.id) || 1) * 2);

        const simulation = d3.forceSimulation(data.nodes)
            .force("link", d3.forceLink(data.edges).id(d => d.id).distance(80))
            .force("charge", d3.forceManyBody().strength(-220))
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(d => radius(d) + 4));

        const link = g.append("g")
            .selectAll("line")
            .data(data.edges)
            .enter().append("line")
            .attr("class", "link");

        const node = g.append("g")
            .selectAll("circle")
            .data(data.nodes)
            .enter().append("circle")
            .attr("class", "node")
            .attr("r", radius)
            .attr("fill", d => colorFor(d.category))
            .on("mouseover", function(event, d) {
                highlightNeighborhood(d);
                tooltip.transition().duration(150).style("opacity", 0.96);
                tooltip.html(`<strong>${d.title}</strong><br/><span class="tooltip-meta">${d.category} · ${degree.get(d.id) || 0} connection${(degree.get(d.id) || 0) === 1 ? "" : "s"}</span>`)
                    .style("left", (event.pageX + 12) + "px")
                    .style("top", (event.pageY - 10) + "px");
            })
            .on("mouseout", function() {
                clearHighlight();
                tooltip.transition().duration(300).style("opacity", 0);
            })
            .on("click", function(event, d) {
                window.location.href = d.url;
            })
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        // Labels: hubs are labeled by default; the toggle shows everything.
        const HUB_DEGREE = 8;
        const labels = g.append("g")
            .selectAll("text")
            .data(data.nodes)
            .enter().append("text")
            .attr("class", "node-label")
            .text(d => d.title.length > 34 ? d.title.substring(0, 34) + "…" : d.title)
            .style("opacity", d => (degree.get(d.id) || 0) >= HUB_DEGREE ? 1 : 0);

        // Neighborhood focus on hover.
        const neighbors = new Map();
        data.edges.forEach(e => {
            const s = e.source.id || e.source, t = e.target.id || e.target;
            (neighbors.get(s) || neighbors.set(s, new Set()).get(s)).add(t);
            (neighbors.get(t) || neighbors.set(t, new Set()).get(t)).add(s);
        });

        function highlightNeighborhood(d) {
            const near = neighbors.get(d.id) || new Set();
            node.style("opacity", n => (n.id === d.id || near.has(n.id)) ? 1 : 0.12);
            labels.style("opacity", n =>
                n.id === d.id ? 1 :
                near.has(n.id) ? 0.9 :
                0);
            link.style("stroke-opacity", e =>
                (e.source.id === d.id || e.target.id === d.id) ? 0.85 : 0.05)
                .style("stroke", e =>
                    (e.source.id === d.id || e.target.id === d.id)
                        ? getComputedStyle(document.body).getPropertyValue("--accent").trim()
                        : null);
        }

        let labelsVisible = false;
        function clearHighlight() {
            node.style("opacity", 1);
            link.style("stroke-opacity", null).style("stroke", null);
            labels.style("opacity", d =>
                labelsVisible ? 1 : ((degree.get(d.id) || 0) >= HUB_DEGREE ? 1 : 0));
        }

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);
            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);
            labels
                .attr("x", d => d.x)
                .attr("y", d => d.y + radius(d) + 12);
        });

        // Legend: the categories actually present, largest first.
        const counts = d3.rollup(data.nodes, v => v.length, d => d.category);
        const legend = document.getElementById('graphLegend');
        [...counts.entries()].sort((a, b) => b[1] - a[1]).forEach(([cat, n]) => {
            const item = document.createElement('span');
            const swatch = document.createElement('span');
            swatch.className = 'legend-swatch';
            swatch.style.background = colorFor(cat);
            item.appendChild(swatch);
            item.appendChild(document.createTextNode(`${cat} (${n})`));
            legend.appendChild(item);
        });

        // Re-tint everything when the theme toggles.
        new MutationObserver(() => {
            node.attr("fill", d => colorFor(d.category));
            legend.querySelectorAll('.legend-swatch').forEach((sw, i) => {
                const cat = [...counts.entries()].sort((a, b) => b[1] - a[1])[i][0];
                sw.style.background = colorFor(cat);
            });
        }).observe(document.body, { attributes: true, attributeFilter: ["class"] });

        document.getElementById('resetZoom').onclick = () => {
            svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
        };

        const labelsButton = document.getElementById('toggleLabels');
        labelsButton.onclick = () => {
            labelsVisible = !labelsVisible;
            labelsButton.classList.toggle('active', labelsVisible);
            labels.transition().duration(300).style("opacity", d =>
                labelsVisible ? 1 : ((degree.get(d.id) || 0) >= HUB_DEGREE ? 1 : 0));
        };

        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
    }).catch(function(error) {
        console.error("Error loading graph data:", error);
        document.getElementById('graphStats').textContent = "Error loading graph data";
    });
});
</script>
{% endblock %}
